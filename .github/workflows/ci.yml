name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --timeout=30

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --timeout=60 -m "not serial and not bluetooth"

      - name: Run acceptance tests
        run: pytest tests/acceptance/ -v --tb=short --timeout=120

  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov --cov-report=xml --cov-report=term-missing --timeout=120 -m "not serial and not bluetooth"

      - name: Check coverage threshold
        run: coverage report
